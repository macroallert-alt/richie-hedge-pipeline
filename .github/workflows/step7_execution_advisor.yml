name: "Step 7 — Execution Advisor"

on:
  workflow_dispatch:

jobs:
  execution-advisor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install anthropic google-api-python-client google-auth pyyaml

      - name: Run Execution Advisor
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m step7_execution_advisor

      - name: Commit archive + dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATUM=$(date +%Y-%m-%d)
          git add archive/ data/dashboard/ data/weights_history/
          git diff --cached --quiet || git commit -m "Step 7 Execution Advisor + Rotation: ${DATUM}"
          git pull --rebase
          git push

      - name: Trigger Crypto Daily Risk Check
        if: success()
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/step0y_crypto_daily.yml/dispatches \
            -d '{"ref":"main"}'

      - name: Wait for Crypto Daily Check
        if: success()
        run: sleep 30

      - name: Trigger Step 0z Command Center
        if: success()
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/step0z_command_center.yml/dispatches \
            -d '{"ref":"main"}'
