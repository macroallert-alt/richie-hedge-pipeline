name: Step 2 Signal Generator

on:
  workflow_run:
    workflows: ["Step 1 Market Analyst"]
    types: [completed]
  workflow_dispatch:

jobs:
  signal-generator:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install google-api-python-client google-auth

      - name: Run Signal Generator
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          python -m step2_signal_generator

      - name: Commit archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/ || true
          git diff --cached --quiet || git commit -m "Step 2: Signal Generator archive $(date -u +%Y-%m-%d)"
          git push || true
