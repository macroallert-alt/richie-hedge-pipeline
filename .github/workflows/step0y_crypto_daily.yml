name: Crypto Circle Daily Risk Check

on:
  workflow_dispatch:

jobs:
  crypto-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests numpy pandas gspread google-auth

      - name: Run Daily Risk Check
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m step_0y_crypto.daily_risk_check

      - name: Commit Daily Check JSON
        run: |
          cd step_0y_crypto/data
          if [ -f crypto_daily_check.json ]; then
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add crypto_daily_check.json
            git diff --cached --quiet || git commit -m "crypto daily check $(date -u +%Y-%m-%d)"
            git push
          fi
