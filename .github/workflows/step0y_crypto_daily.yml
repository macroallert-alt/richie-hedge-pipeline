name: Crypto Circle Daily Signal Engine

on:
  workflow_dispatch:

jobs:
  crypto-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests numpy pandas gspread google-auth

      - name: Run Daily Signal Engine
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m step_0y_crypto.daily_risk_check

      - name: Commit and Push
        run: |
          cd step_0y_crypto/data
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add crypto_state.json crypto_daily_check.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "crypto daily signal $(date -u +%Y-%m-%d)"
          git push
