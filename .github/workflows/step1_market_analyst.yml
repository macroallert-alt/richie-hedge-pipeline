name: Step 1 — Market Analyst

on:
  workflow_dispatch:

jobs:
  market-analyst:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install gspread google-auth google-api-python-client

      - name: Run Market Analyst
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          cd step1_market_analyst
          python engine.py

      - name: Commit archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/
          git diff --staged --quiet || git commit -m "Archive: Market Analyst $(date +%Y-%m-%d)"
          git pull --rebase
          git push

      - name: Trigger Step 2
        if: success()
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/step2_signal_generator.yml/dispatches \
            -d '{"ref":"main"}'

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/gcp_sa.json
