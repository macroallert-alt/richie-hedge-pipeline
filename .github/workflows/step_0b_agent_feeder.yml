name: Step 0b — Agent Feeder (30 Fields → RAW_AGENT2)

on:
  schedule:
    - cron: '30 3 * * 1-5'   # 03:30 UTC = 04:30 CET, Mon-Fri (before Step 1 at 04:50)
  workflow_dispatch:

jobs:
  agent-feeder:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp_sa.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r step_0b_agent_feeder/requirements.txt

      - name: Write GCP credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > /tmp/gcp_sa.json

      - name: Run Agent Feeder
        run: python step_0b_agent_feeder/main.py
