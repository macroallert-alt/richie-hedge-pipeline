name: One-Time DW Cleanup
on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install gspread google-auth

      - name: Write credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > /tmp/gcp_sa.json

      - name: Run cleanup
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp_sa.json
        run: python patch_and_cleanup.py --cleanup-only
