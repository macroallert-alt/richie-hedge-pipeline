name: "Step 0k Event Calendar Updater"

on:
  schedule:
    - cron: "0 6 1 * *"       # 1st of each month, 06:00 UTC
  workflow_dispatch:            # Manual trigger

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install anthropic pyyaml

      - name: Run Event Calendar Updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m step_0k_event_calendar

      - name: Commit updated calendar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATUM=$(date +%Y-%m-%d)
          git add step_0k_event_calendar/EVENT_CALENDAR.yaml
          git add archive/
          git diff --cached --quiet || git commit -m "Event Calendar: Updated ${DATUM}"
          git push
