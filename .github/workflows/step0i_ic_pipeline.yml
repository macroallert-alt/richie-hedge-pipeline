name: IC Pipeline — Intelligence Collector

on:
  schedule:
    - cron: '0 5 * * 1-5'  # Mo-Fr 05:00 UTC
  workflow_dispatch:
    inputs:
      stage:
        description: 'Pipeline stage to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - extraction
          - intelligence
          - briefing

jobs:
  ic_pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install anthropic feedparser beautifulsoup4 requests youtube-transcript-api
          pip install google-auth google-auth-oauthlib google-api-python-client

      - name: Run IC Pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python -m step_0i_ic_pipeline.main --stage ${{ github.event.inputs.stage || 'all' }}

      - name: Commit state updates
        run: |
          git config user.name "IC Pipeline"
          git config user.email "ic@pipeline.local"
          git add step_0i_ic_pipeline/data/history/beliefs.json
          git add step_0i_ic_pipeline/data/history/fetch_state.json
          git diff --staged --quiet || git commit -m "IC: Update state $(date +%Y-%m-%d)"
          git push