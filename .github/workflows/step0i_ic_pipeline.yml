name: IC Pipeline — Intelligence Collector

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Pipeline stage to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - extraction
          - intelligence
          - briefing

jobs:
  ic_pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install anthropic feedparser beautifulsoup4 requests youtube-transcript-api
          pip install google-auth google-auth-oauthlib google-api-python-client

      - name: Run IC Pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: python -m step_0i_ic_pipeline.main --stage ${{ github.event.inputs.stage || 'all' }}

      - name: Commit state updates + archive
        run: |
          git config user.name "IC Pipeline"
          git config user.email "ic@pipeline.local"
          git stash --include-untracked
          git pull --rebase origin main
          git stash pop || true
          git add step_0i_ic_pipeline/data/history/belief_state.json
          git add step_0i_ic_pipeline/data/history/fetch_state.json
          git add step_0i_ic_pipeline/data/history/claims_archive.json
          git add step_0i_ic_pipeline/data/history/threads.json
          git add step_0i_ic_pipeline/data/history/pre_mortems.json
          git add step_0i_ic_pipeline/data/history/source_history.json
          git add data/dashboard/latest.json
          git add archive/
          git diff --staged --quiet || git commit -m "IC: Update state + dashboard + archive $(date +%Y-%m-%d)"
          git push

      - name: Trigger Step 1
        if: success()
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/step1_market_analyst.yml/dispatches \
            -d '{"ref":"main"}'
