name: Secular Trends (Step 0w)

on:
  schedule:
    - cron: '0 3 1-7 * 0'   # Erster Sonntag im Monat, 03:00 UTC
  workflow_dispatch:           # Manueller Trigger

jobs:
  secular-trends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install fredapi requests numpy scipy anthropic pandas

      - name: Run Secular Trends
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m step_0w_secular.secular_trends --skip-git

      - name: Commit + Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add step_0w_secular/data/
          git diff --cached --quiet || git commit -m "Secular Trends monthly update"
          git pull --rebase
          git push
