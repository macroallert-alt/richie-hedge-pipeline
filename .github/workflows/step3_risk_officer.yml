name: Step 3 — Risk Officer

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no Sheet write)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  risk_officer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyyaml google-auth google-auth-oauthlib google-api-python-client

      - name: Run Risk Officer
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          DRIVE_ROOT_ID: "1Tng3i4Cly7isKOxIkGqiTmGiZNEtPj3D"
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m step3_risk_officer --dry-run
          else
            python -m step3_risk_officer
          fi

      - name: Commit archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/
          git diff --staged --quiet || git commit -m "Archive: Risk Officer $(date +%Y-%m-%d)"
          git pull --rebase
          git push

      - name: Trigger Step 4
        if: success()
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/step4_cio_draft.yml/dispatches \
            -d '{"ref":"main"}'
