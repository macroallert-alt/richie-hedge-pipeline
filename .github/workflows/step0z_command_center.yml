name: "Step 0z — Command Center Daily"

on:
  workflow_dispatch:

jobs:
  command-center-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests gspread google-auth

      - name: Run Command Center Daily
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          python -m step_0z_command_center.command_center_agent --mode daily

      - name: Commit Command Center outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATUM=$(date +%Y-%m-%d)
          git add step_0z_command_center/data/
          git diff --cached --quiet || git commit -m "Step 0z Command Center Daily: ${DATUM}"
          git pull --rebase origin main
          git push

      - name: Trigger Daily Briefing
        if: success()
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/step0u_daily_briefing.yml/dispatches \
            -d '{"ref":"main"}'
