name: Step 0r — Router Data Collector

on:
  schedule:
    - cron: '10 5 * * 1-5'  # 05:10 UTC Mo-Fr
  workflow_dispatch:

permissions:
  contents: write

jobs:
  router-data:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance fredapi pandas numpy pyarrow google-api-python-client google-auth

      - name: Run Router Data Collector
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          python -m step_0r_router_data_signal_generator

      - name: Commit archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/ data/cache/router/
          git diff --cached --quiet || git commit -m "Router Data: $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
