  XLK: {Tech: 1.0}
  XLF: {Financials: 1.0}
  XLE: {Energy: 1.0}
  XLV: {Healthcare: 1.0}
  XLI: {Industrials: 1.0}
  XLY: {Consumer_Discretionary: 1.0}
  XLP: {Consumer_Staples: 1.0}
  XLU: {Utilities: 1.0}
  XLRE: {Real_Estate: 1.0}
  XLC: {Communication_Services: 1.0}
  XLB: {Materials: 1.0}

  # Multi-Sektor-ETFs (approximierte Top-Gewichte, Stand Feb 2026)
  SPY: {Tech: 0.30, Financials: 0.13, Healthcare: 0.13, Consumer_Discretionary: 0.10, Other: 0.34}
  QQQ: {Tech: 0.58, Communication_Services: 0.16, Consumer_Discretionary: 0.13, Other: 0.13}
  RSP: {Tech: 0.15, Financials: 0.12, Healthcare: 0.12, Industrials: 0.12, Other: 0.49}
  IWM: {Financials: 0.17, Healthcare: 0.16, Industrials: 0.15, Other: 0.52}

